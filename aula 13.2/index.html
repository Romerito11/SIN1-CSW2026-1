<head>

</head>

<body>

<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(187, 187, 187);
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;

    }

    .card {
        flex-basis: 200px;
        border: 1px solid white;

    }

    .btn{
        background-color: rgb(0, 174, 255);
        flex-basis: 40%;
        border: 1px solid rgb(0, 174, 255);
        padding: 15px;
        border-radius: 10px;
        text-align: center;
    }

    .tudo {
        width: 80%;
        display: flex;
        align-content: space-around;
        align-items: center;
        flex-wrap: wrap;
        gap: 50px;
        justify-content: center;
    }
</style>
